name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Only the light deps the unit tests need — no xgboost/shap/streamlit/
      # statsmodels (those are exercised by the runnable scripts, not the tests).
      - name: Install test dependencies
        run: pip install pandas numpy matplotlib scikit-learn duckdb statsmodels pytest
      - name: Run tests
        run: pytest tests/ -q
